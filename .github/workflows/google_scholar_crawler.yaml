name: Get Citation Data

on:
  workflow_dispatch:
  page_build:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
    - name: Restore previous citation snapshot
      run: |
        mkdir -p google_scholar_crawler/results
        git fetch origin google-scholar-stats:refs/remotes/origin/google-scholar-stats 2>/dev/null || true
        if git rev-parse --verify refs/remotes/origin/google-scholar-stats >/dev/null 2>&1; then
          git show refs/remotes/origin/google-scholar-stats:gs_data.json > google_scholar_crawler/results/gs_data.json
          git show refs/remotes/origin/google-scholar-stats:gs_data_shieldsio.json > google_scholar_crawler/results/gs_data_shieldsio.json
          echo "Restored previous citation snapshot from google-scholar-stats branch."
        else
          echo "No previous citation snapshot found."
        fi
    - name: Install Reqs
      run: |
        sudo apt-get install -y python3-setuptools
    - name: Crawl Google Scholar
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
    - name: Push citation data
      run: |
        if [ ! -f google_scholar_crawler/results/gs_data.json ]; then
          echo "No citation data available to push."
          exit 1
        fi
        cd ./google_scholar_crawler/results
        git init
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add *.json
        if git diff --cached --quiet; then
          echo "No citation changes to push."
        else
          git commit -m "Updated Citation Data"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:google-scholar-stats --force
        fi
